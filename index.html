<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Plenos - Lista de Precios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
    </style>
</head>
<body class="min-h-screen font-sans">

    <div class="flex flex-col md:flex-row h-screen">
        <aside class="w-full md:w-80 glass p-8 flex flex-col gap-6">
            <div class="text-center">
                <h1 class="text-2xl font-bold tracking-tight text-white">GRUPO <span class="text-blue-400">PLENOS</span></h1>
                <div class="flex justify-center gap-2 mt-2">
                    <div class="w-2 h-2 rounded-full bg-[#00bcd4]"></div>
                    <div class="w-2 h-2 rounded-full bg-[#e91e63]"></div>
                    <div class="w-2 h-2 rounded-full bg-[#ffeb3b]"></div>
                    <div class="w-2 h-2 rounded-full bg-[#9e9e9e]"></div>
                </div>
            </div>

            <div class="mt-10">
                <label class="block text-sm font-medium text-gray-400 mb-2">Cargar Inventario</label>
                <input type="file" id="fileInput" accept=".xlsx, .xls" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor:pointer">
            </div>

            <div class="mt-4">
                <label class="block text-sm font-medium text-gray-400 mb-2">Buscador</label>
                <input type="text" id="searchInput" placeholder="Ej: Ricoh 301..." class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-white">
            </div>

            <div class="mt-auto text-xs text-gray-600 text-center">
                Portal de Tecnología de Impresión v3.0
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 overflow-auto">
            <div class="max-w-6xl mx-auto">
                <div id="welcomeScreen" class="text-center py-20">
                    <h2 class="text-4xl font-bold text-gray-600">Bienvenido al Portal</h2>
                    <p class="text-gray-500 mt-4">Sube un archivo Excel para comenzar a visualizar los precios.</p>
                </div>

                <div id="tableContainer" class="hidden">
                    <div class="flex justify-between items-end mb-8">
                        <div>
                            <h2 class="text-3xl font-bold text-white">Lista de Precios</h2>
                            <p class="text-blue-400" id="fileNameDisp"></p>
                        </div>
                        <div class="bg-blue-900/30 border border-blue-500/50 px-4 py-2 rounded-lg text-blue-300 text-sm">
                            Items: <span id="itemCount" class="font-bold">0</span>
                        </div>
                    </div>

                    <div class="overflow-hidden rounded-xl border border-[#30363d] bg-[#161b22]">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-[#21262d] text-gray-400 text-xs uppercase">
                                <tr id="tableHeader"></tr>
                            </thead>
                            <tbody id="tableBody" class="text-sm divide-y divide-[#30363d]">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let fullData = [];
        const fileInput = document.getElementById('fileInput');
        const searchInput = document.getElementById('searchInput');
        const tableContainer = document.getElementById('tableContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');
        const itemCount = document.getElementById('itemCount');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                fullData = XLSX.utils.sheet_to_json(worksheet);
                
                if (fullData.length > 0) {
                    renderTable(fullData);
                    welcomeScreen.classList.add('hidden');
                    tableContainer.classList.remove('hidden');
                    document.getElementById('fileNameDisp').innerText = file.name;
                }
            };
            reader.readAsBinaryString(file);
        });

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = fullData.filter(row => 
                Object.values(row).some(val => String(val).toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        function renderTable(data) {
            tableHeader.innerHTML = '';
            tableBody.innerHTML = '';
            
            if (data.length === 0) return;

            const headers = Object.keys(data[0]);
            headers.forEach(h => {
                const th = document.createElement('th');
                th.className = 'px-6 py-4 font-semibold';
                th.innerText = h;
                tableHeader.appendChild(th);
            });

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[#1c2128] transition-colors';
                headers.forEach(h => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 text-gray-300';
                    td.innerText = row[h] || '-';
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });
            itemCount.innerText = data.length;
        }
    </script>
</body>
</html>
