<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Grupo Plenos | Lista Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: sans-serif; }
        .sidebar { background-color: #161b22; border-right: 1px solid #30363d; }
        .tabla-contenedor { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <aside class="sidebar w-full md:w-80 p-6 flex flex-col gap-6">
        <div class="text-center">
            <h1 class="text-xl font-bold text-white tracking-widest">GRUPO PLENOS</h1>
            <div class="flex justify-center gap-1 mt-2">
                <div class="w-3 h-3 bg-[#00bcd4]"></div><div class="w-3 h-3 bg-[#e91e63]"></div><div class="w-3 h-3 bg-[#ffeb3b]"></div>
            </div>
        </div>

        <div class="mt-4">
            <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Buscar Producto</label>
            <input type="text" id="filtro" placeholder="Ej: Ricoh, LED..." 
                class="w-full bg-[#0d1117] border border-[#30363d] rounded px-4 py-2 text-white text-sm outline-none focus:border-blue-500">
        </div>
        
        <div id="status" class="text-[10px] text-center uppercase mt-auto text-gray-500 font-bold">
            Cargando base de datos...
        </div>
    </aside>

    <main class="flex-1 p-6 overflow-hidden flex flex-col">
        <div class="overflow-auto flex-1 tabla-contenedor">
            <table class="w-full text-left text-sm">
                <thead class="sticky top-0 bg-[#21262d] text-gray-400">
                    <tr id="cabeceraTabla"></tr>
                </thead>
                <tbody id="cuerpoTabla" class="divide-y divide-[#30363d]"></tbody>
            </table>
        </div>
    </main>

    <script>
        // --- CONFIGURACIÓN ---
        // Cambia esto por la URL de tu archivo en GitHub
        // Formato: https://raw.githubusercontent.com/TU_USUARIO/TU_REPOSITORIO/main/NOMBRE_ARCHIVO.xlsx
        const URL_ARCHIVO = 'lista_precios.xlsx'; 

        let datos = [];

        async function descargarLista() {
            try {
                const response = await fetch(URL_ARCHIVO);
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                datos = XLSX.utils.sheet_to_json(sheet);
                
                renderizar(datos);
                document.getElementById('status').innerText = 'Lista Sincronizada ✅';
            } catch (e) {
                document.getElementById('status').innerText = 'Error: Sube el Excel al servidor ❌';
            }
        }

        function renderizar(lista) {
            const head = document.getElementById('cabeceraTabla');
            const body = document.getElementById('cuerpoTabla');
            head.innerHTML = ''; body.innerHTML = '';
            if (lista.length === 0) return;

            Object.keys(lista[0]).forEach(k => {
                const th = document.createElement('th');
                th.className = 'px-6 py-4'; th.innerText = k;
                head.appendChild(th);
            });

            lista.forEach(r => {
                const tr = document.createElement('tr');
                Object.values(r).forEach(v => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 text-gray-300';
                    td.innerText = v || '-';
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        document.getElementById('filtro').addEventListener('input', (e) => {
            const buscar = e.target.value.toLowerCase();
            const f = datos.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(buscar)));
            renderizar(f);
        });

        window.onload = descargarLista;
    </script>
</body>
</html>
