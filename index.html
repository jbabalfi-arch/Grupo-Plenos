<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        /* Estilo Dark Profesional */
        .app-body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; display: flex; height: 400px; border-radius: 12px; overflow: hidden; border: 1px solid #30363d; }
        .side { width: 200px; background-color: #161b22; border-right: 1px solid #30363d; padding: 20px; flex-shrink: 0; }
        .main { flex-grow: 1; padding: 25px; overflow-y: auto; background-color: #0d1117; }
        
        /* Identidad Visual */
        .logo-txt { font-weight: bold; font-size: 14px; text-align: center; margin-bottom: 20px; }
        .dot-row { display: flex; justify-content: center; gap: 4px; margin-top: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 2px; }
        
        /* Elementos de Interfaz */
        .btn-upload { background: #21262d; border: 1px solid #30363d; color: #58a6ff; padding: 8px; border-radius: 6px; width: 100%; font-size: 12px; cursor: pointer; text-align: center; margin-bottom: 15px; }
        .search-box { background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 6px; width: 100%; font-size: 12px; margin-bottom: 15px; }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #161b22; color: #8b949e; text-align: left; padding: 10px; border-bottom: 1px solid #30363d; }
        td { padding: 10px; border-bottom: 1px solid #21262d; }
        .price { color: #3fb950; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-body">
        <div class="side">
            <div class="logo-txt">
                GRUPO PLENOS
                <div class="dot-row">
                    <div class="dot" style="background:#00bcd4"></div>
                    <div class="dot" style="background:#e91e63"></div>
                    <div class="dot" style="background:#ffeb3b"></div>
                    <div class="dot" style="background:#9e9e9e"></div>
                </div>
            </div>
            <div class="btn-upload">📂 Cargar Excel</div>
            <input type="text" class="search-box" placeholder="🔍 Buscar modelo...">
            <div style="font-size: 10px; color: #484f58; margin-top: 50px;">TECNOLOGÍA DE IMPRESIÓN</div>
        </div>
        <div class="main">
            <h3 style="margin-top:0">Lista de Precios</h3>
            <table>
                <thead>
                    <tr>
                        <th>PRODUCTO</th>
                        <th>STOCK</th>
                        <th>PRECIO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Tóner Ricoh MP 301 (Alt)</td>
                        <td>25 un.</td>
                        <td class="price">$18.50</td>
                    </tr>
                    <tr>
                        <td>Módulo LED P3.91 Ext.</td>
                        <td>12 un.</td>
                        <td class="price">$420.00</td>
                    </tr>
                    <tr>
                        <td>Tinta Epson 544 Black</td>
                        <td>100+</td>
                        <td class="price">$12.30</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
