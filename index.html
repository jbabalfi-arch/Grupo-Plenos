<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Grupo Plenos | Portal de Precios Oficial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: sans-serif; }
        .sidebar { background-color: #161b22; border-right: 1px solid #30363d; }
        .tabla-contenedor { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        /* Animación de carga */
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <aside class="sidebar w-full md:w-80 p-6 flex flex-col gap-6">
        <div class="text-center">
            <h1 class="text-xl font-bold text-white tracking-widest">GRUPO PLENOS</h1>
            <div class="flex justify-center gap-1 mt-2">
                <div class="w-3 h-3 bg-[#00bcd4]"></div>
                <div class="w-3 h-3 bg-[#e91e63]"></div>
                <div class="w-3 h-3 bg-[#ffeb3b]"></div>
                <div class="w-3 h-3 bg-[#9e9e9e]"></div>
            </div>
        </div>

        <div class="mt-4">
            <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">Buscar Producto</label>
            <input type="text" id="filtro" placeholder="Ej: Ricoh 301..." 
                class="w-full bg-[#0d1117] border border-[#30363d] rounded px-4 py-2 text-white text-sm outline-none focus:border-blue-500">
        </div>

        <div id="status" class="mt-auto p-4 rounded bg-gray-800/50 text-[10px] text-center uppercase tracking-widest text-gray-400">
            Sincronizando con servidor...
        </div>
    </aside>

    <main class="flex-1 p-6 overflow-hidden flex flex-col">
        <div id="mensajeCarga" class="flex-1 flex flex-col items-center justify-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-12 w-12 mb-4"></div>
            <h2 class="text-xl font-bold text-gray-600">Actualizando Lista...</h2>
        </div>

        <div id="vistaDatos" class="hidden flex-1 overflow-hidden flex flex-col">
            <div class="overflow-auto flex-1 tabla-contenedor">
                <table class="w-full text-left text-sm">
                    <thead class="sticky top-0 bg-[#21262d] text-gray-400">
                        <tr id="cabeceraTabla"></tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-[#30363d]"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURACIÓN ---
        // Nombre del archivo que debes subir a tu GitHub junto a este HTML
        const NOMBRE_ARCHIVO = 'lista_precios.xlsx'; 

        let datos = [];
        const filtro = document.getElementById('filtro');

        // FUNCIÓN QUE BUSCA EL EXCEL EN EL SERVIDOR AUTOMÁTICAMENTE
        async function cargarExcelDesdeServidor() {
            try {
                // Buscamos el archivo en la misma carpeta donde está el HTML
                const response = await fetch(NOMBRE_ARCHIVO);
                if (!response.ok) throw new Error("No se encontró el archivo en el servidor");
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                datos = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                
                if (datos.length > 0) {
                    document.getElementById('mensajeCarga').classList.add('hidden');
                    document.getElementById('vistaDatos').classList.remove('hidden');
                    document.getElementById('status').innerText = "Conectado ✅";
                    actualizarTabla(datos);
                }
            } catch (error) {
                console.error(error);
                document.getElementById('mensajeCarga').innerHTML = `
                    <h2 class="text-red-500 font-bold">Error de Conexión</h2>
                    <p class="text-gray-500 text-sm">Asegúrate de subir el archivo "${NOMBRE_ARCHIVO}" a GitHub.</p>
                `;
                document.getElementById('status').innerText = "Error de servidor ❌";
            }
        }

        // FUNCIÓN PARA FILTRAR
        filtro.addEventListener('input', (e) => {
            const buscar = e.target.value.toLowerCase();
            const filtrados = datos.filter(f => 
                Object.values(f).some(v => String(v).toLowerCase().includes(buscar))
            );
            actualizarTabla(filtrados);
        });

        function actualizarTabla(lista) {
            const head = document.getElementById('cabeceraTabla');
            const body = document.getElementById('cuerpoTabla');
            head.innerHTML = ''; body.innerHTML = '';

            if (lista.length === 0) return;

            Object.keys(lista[0]).forEach(k => {
                const th = document.createElement('th');
                th.className = 'px-6 py-4';
                th.innerText = k;
                head.appendChild(th);
            });

            lista.forEach(r => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[#1c2128] transition-colors';
                Object.values(r).forEach(v => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 text-gray-300';
                    td.innerText = v || '-';
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        // Ejecutar la carga apenas abre la página
        window.onload = cargarExcelDesdeServidor;
    </script>
</body>
</html>
