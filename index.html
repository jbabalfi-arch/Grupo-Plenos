<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Grupo Plenos | Portal de Precios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: sans-serif; }
        .sidebar { background-color: #161b22; border-right: 1px solid #30363d; min-width: 320px; }
        .tabla-contenedor { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        .btn-admin { background: #238636; color: white; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; text-align: center; display: block; }
        .btn-admin:hover { background: #2ea043; }
        /* Estilo para que el logo se adapte bien */
        .logo-container img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <aside class="sidebar p-6 flex flex-col gap-6">
        <div class="logo-container">
            <img src="Logo 2.jpg" alt="Grupo Plenos Logo">
        </div>

        <div class="mt-4">
            <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">🔍 Buscar Producto</label>
            <input type="text" id="filtro" placeholder="Ej: Ricoh, LED, Toner..." 
                class="w-full bg-[#0d1117] border border-[#30363d] rounded px-4 py-2 text-white text-sm outline-none focus:border-blue-500">
        </div>

        <hr class="border-[#30363d]">

        <div>
            <label class="block text-xs font-bold text-blue-400 mb-2 uppercase">⚙️ Administrador: Subir Excel</label>
            <label for="archivoExcel" class="btn-admin">📂 Seleccionar Archivo</label>
            <input type="file" id="archivoExcel" accept=".xlsx, .xls" class="hidden">
            <p class="text-[10px] text-gray-500 mt-2 italic text-center">Sube el archivo aquí para actualizar la tabla.</p>
        </div>

        <div id="status" class="mt-auto text-[10px] text-center text-gray-500 font-bold uppercase">
            Estado: Conectado ✅
        </div>
    </aside>

    <main class="flex-1 p-6 overflow-hidden flex flex-col">
        <div id="vacio" class="flex-1 flex flex-col items-center justify-center border-2 border-dashed border-[#30363d] rounded-xl">
            <h2 class="text-2xl font-bold text-gray-600">Portal de Precios</h2>
            <p class="text-gray-500 mt-2">Usa el botón lateral para cargar tu lista de Excel.</p>
        </div>

        <div id="vistaDatos" class="hidden flex-1 overflow-hidden flex flex-col">
            <div class="overflow-auto flex-1 tabla-contenedor shadow-2xl">
                <table class="w-full text-left text-sm">
                    <thead class="sticky top-0 bg-[#21262d] text-gray-400">
                        <tr id="cabeceraTabla"></tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-[#30363d]"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let datos = [];
        const input = document.getElementById('archivoExcel');
        const filtro = document.getElementById('filtro');

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = event.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                datos = XLSX.utils.sheet_to_json(sheet);
                
                if (datos.length > 0) {
                    localStorage.setItem('plenos_data', JSON.stringify(datos));
                    mostrarApp();
                    actualizarTabla(datos);
                }
            };
            reader.readAsBinaryString(file);
        });

        window.onload = () => {
            const guardados = localStorage.getItem('plenos_data');
            if (guardados) {
                datos = JSON.parse(guardados);
                mostrarApp();
                actualizarTabla(datos);
            }
        };

        function mostrarApp() {
            document.getElementById('vacio').classList.add('hidden');
            document.getElementById('vistaDatos').classList.remove('hidden');
        }

        filtro.addEventListener('input', (e) => {
            const buscar = e.target.value.toLowerCase();
            const filtrados = datos.filter(f => 
                Object.values(f).some(v => String(v).toLowerCase().includes(buscar))
            );
            actualizarTabla(filtrados);
        });

        function actualizarTabla(lista) {
            const head = document.getElementById('cabeceraTabla');
            const body = document.getElementById('cuerpoTabla');
            head.innerHTML = ''; body.innerHTML = '';
            if (lista.length === 0) return;

            Object.keys(lista[0]).forEach(k => {
                const th = document.createElement('th');
                th.className = 'px-6 py-4 font-bold uppercase text-[11px]'; th.innerText = k;
                head.appendChild(th);
            });

            lista.forEach(r => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[#1c2128] transition-colors';
                Object.values(r).forEach(v => {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 text-gray-300 border-b border-[#21262d]';
                    td.innerText = v || '-';
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }
    </script>
</body>
</html>
